# W&B sweep for go1-train-him-rough PPO hyperparameters.
#
# Goal: push HIM's Train/mean_reward, Curriculum/terrain_levels,
# Train/mean_episode_length, and the training metric upward together.
# These four are strongly correlated across methods, so we optimize on
# Train/mean_reward alone and inspect the others on the dashboard.
#
# Horizon matches the reference run (scripts/train_seeds.sh): 20000
# iterations at the default 4096 envs.
#
# Usage (from project root):
#   wandb sweep -e kailintong-wb -p TAR_workspace scripts/sweeps/sweep_him_rough.yaml
#   # then on each GPU:
#   CUDA_VISIBLE_DEVICES=0 wandb agent --count 12 kailintong-wb/TAR_workspace/<sweep_id>
#
# How params are passed:
#   ${args_no_hyphens} forwards each parameter as `key=value` (no leading
#   `--`). train.py uses argparse `parse_known_args`, so unknown
#   `key=value` tokens are forwarded to Hydra as config overrides
#   (`agent.algorithm.lr_max=...`).

program: standalone/tarloco/train.py
method: bayes

metric:
  name: Train/mean_reward
  goal: maximize

# Hyperband: 20000-iter horizon. Brackets evaluate trials at 2k / 6k /
# 20k iters and kill those below the median. eta=3, s=2. Saves ~50-60%
# compute vs. running every trial to 20k.
early_terminate:
  type: hyperband
  min_iter: 2000
  max_iter: 20000
  s: 2
  eta: 3

# Fixed args. num_envs defaults to 4096 in the env config — matches the
# reference run, so we don't override it here.
command:
  - ${env}
  - python
  - ${program}
  - --task=go1-train-him-rough
  - --headless
  - --logger=wandb
  - --max_iterations=20000
  - --job_type=sweep
  - ${args_no_hyphens}

# Search space tightened around HIM defaults
# (exts/tarloco/tasks/agents/rsl_rl_cfg.py:325).
parameters:
  # ---- learning rate (HIM default 1e-3) ----
  agent.algorithm.lr_max:
    distribution: log_uniform_values
    min: 3.0e-4
    max: 2.0e-3
  # ---- exploration (HIM default 0.01) ----
  agent.algorithm.entropy_coef:
    distribution: log_uniform_values
    min: 3.0e-3
    max: 3.0e-2
  agent.policy.init_noise_std:
    distribution: uniform
    min: 0.7
    max: 1.3
  # ---- PPO clip / KL (defaults 0.2 / 0.01) ----
  agent.algorithm.clip_param:
    distribution: uniform
    min: 0.15
    max: 0.25
  agent.algorithm.desired_kl:
    distribution: log_uniform_values
    min: 5.0e-3
    max: 2.0e-2
  # ---- GAE (defaults 0.99 / 0.95) ----
  agent.algorithm.gamma:
    values: [0.99, 0.995]
  agent.algorithm.lam:
    distribution: uniform
    min: 0.92
    max: 0.97
  # ---- update batching (defaults 5 / 4) ----
  agent.algorithm.num_learning_epochs:
    values: [4, 5, 6]
  agent.algorithm.num_mini_batches:
    values: [4, 8]
  # ---- gradient clip (default 1.0) ----
  agent.algorithm.max_grad_norm:
    distribution: uniform
    min: 0.5
    max: 1.5
  # ---- rollout horizon (default 24) ----
  # Longer rollouts give better advantage estimates on rough terrain at
  # the cost of update frequency.
  agent.num_steps_per_env:
    values: [24, 32, 48]
